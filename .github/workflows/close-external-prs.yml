name: Close External PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            // Exempt this repo's own automation: bump-plugin-shas.yml opens its
            // freshness PR with the default GITHUB_TOKEN, so the author is
            // github-actions[bot]. Without this, close-external-prs would
            // auto-close every nightly bump PR. Match on AUTHOR ONLY — never on
            // head.ref: this is a pull_request_target workflow (runs with a write
            // token in the base-repo context on fork PRs), and a fork can open a
            // PR from a branch literally named `bump/plugin-shas`, so a ref-based
            // exemption would be spoofable. `user.login` is the authenticated
            // opener and is not fork-controllable.
            if (author === 'github-actions[bot]') {
              console.log(`${author} is this repo's bump automation — allowing PR`);
              return;
            }

            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: author,
            });

            if (['admin', 'write'].includes(data.permission)) {
              console.log(`${author} has ${data.permission} access — allowing PR`);
              return;
            }

            console.log(`${author} has ${data.permission} access — closing PR`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `Thanks for the PR! This repo is a **read-only mirror** — its contents are synced nightly from Anthropic's internal review pipeline, so direct pull requests are closed automatically.`,
                ``,
                `To submit a plugin to the community marketplace, use [clau.de/plugin-directory-submission](https://clau.de/plugin-directory-submission).`,
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed',
            });
