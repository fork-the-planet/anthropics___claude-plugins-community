name: Revert Failed Bumps

# Drops policy-failing entries from the bump PR so one bad upstream can't block
# the rest, driving the PR to green on its own. Runs after a Validate Plugins
# workflow_run on bump/plugin-shas concludes with a failure: read the per-entry
# verdicts the validate run uploaded, revert just the failing entries' source.sha
# back to main's pin, push a follow-up signed commit, and re-dispatch validate.
# The re-dispatched validate sees only passing entries in the new diff and goes
# green.
#
# Adapted from the scan-plugins-based revert in claude-plugins-official /
# knowledge-work-plugins: this repo's gate is the deterministic `validate-plugins`
# (no Claude API / WIF), so the trigger is "Validate Plugins" and the verdicts
# come from the `validate-verdicts` artifact (run-failed.json = revertable entry
# NAMES; run-meta.json = {completed, nonrevertable}).
#
# Scope and guardrails — this job has contents:write so it must be tight:
#   - Only acts on bump/plugin-shas (literal branch match).
#   - Only acts when validate was DISPATCHED (workflow_dispatch event), i.e. by
#     bump-plugin-shas.yml. A validate run on a regular PR never triggers this.
#   - Only acts when the run COMPLETED (run-meta.completed==true). An infra error
#     (empty/unparseable results) is NOT confusable with a clean all-pass, so it
#     is a no-op, never "all green".
#   - Aborts (no revert, no budget spend) when a NON-REVERTABLE failure is present
#     (whole-marketplace I1/I2/I7, marketplace-schema): dropping a source.sha can't
#     clear those — a human is needed. Posts one operator comment instead.
#   - Only reverts source.sha. If any other field in a failing entry differs from
#     main, the run aborts — that means the bump branch was tampered with.
#   - Bounded at MAX_REVERT_PASSES per night via the PR commit count.
#   - The revert commit is created with createCommitOnBranch (GitHub-signed,
#     compare-and-swap via expectedHeadOid) — no signing key on the runner.

on:
  workflow_run:
    workflows: ["Validate Plugins"]
    types: [completed]

permissions:
  contents: read

env:
  MARKETPLACE: .claude-plugin/marketplace.json
  BUMP_BRANCH: bump/plugin-shas
  MAX_REVERT_PASSES: '3'
  REVERT_MARKER: '<!-- revert-failed-bumps -->'

jobs:
  revert:
    # Tight gate: the triggering validate must be a workflow_dispatch run on the
    # bump branch (i.e. the one bump-plugin-shas.yml dispatched) that failed. A
    # validate on a regular PR, a passing run, or a dispatch on another branch
    # must never reach this job.
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'workflow_dispatch' &&
      github.event.workflow_run.head_branch == 'bump/plugin-shas'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # createCommitOnBranch on bump/plugin-shas
      pull-requests: write  # comment on / close the bump PR
      actions: write        # gh workflow run validate-plugins.yml --ref bump/plugin-shas
    concurrency:
      group: revert-failed-bumps
      cancel-in-progress: false
    steps:
      # The artifact carries run-failed.json (revertable entry NAMES),
      # run-verdicts.json (fail rows for the PR comment) and run-meta.json
      # ({completed, nonrevertable}). It is uploaded by validate-plugins.yml for
      # every dispatched run (if: always) so we can tell "validation found
      # failures" from "validation never ran" (infra error → no revert). The
      # artifact won't exist when the validate action died before its Report step
      # could write it (Setup crash) — handled as the missing-file no-op below.
      - name: Download validate verdicts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: validate-verdicts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: validate-out

      - name: Determine revert set
        id: plan
        run: |
          set -euo pipefail
          if [[ ! -f validate-out/run-meta.json || ! -f validate-out/run-failed.json ]]; then
            echo "::warning::No validate-verdicts artifact — validate produced no verdicts (infra error). Nothing to revert."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! jq -e 'type == "object"' validate-out/run-meta.json >/dev/null 2>&1; then
            echo "::warning::run-meta.json is not an object — refusing to act."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          completed="$(jq -r '.completed // false' validate-out/run-meta.json)"
          if [[ "$completed" != "true" ]]; then
            # Validate crashed before producing verdicts: results empty/unparseable.
            # That is an infra error, NOT "all passed" — do nothing (a clean pass is
            # completed==true with an empty failed list).
            echo "::notice::validate did not complete (completed=$completed) — infra error, not a policy result. Not reverting."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          nonrev="$(jq -c '.nonrevertable // []' validate-out/run-meta.json)"
          if [[ "$(jq 'length' <<<"$nonrev")" -gt 0 ]]; then
            # Whole-marketplace invariant (I1 sort / I2 dups / I7) or marketplace
            # schema failure: dropping one entry's source.sha cannot clear it. Don't
            # spin the revert budget on a PR that can't go green by reverting — alert
            # a human instead.
            echo "::error::Non-revertable failure(s): $nonrev — a human must resolve (dropping a source.sha cannot clear these)."
            echo "act=false" >> "$GITHUB_OUTPUT"
            echo "alert=true" >> "$GITHUB_OUTPUT"
            echo "nonrev=$nonrev" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! jq -e 'type == "array"' validate-out/run-failed.json >/dev/null 2>&1; then
            echo "::warning::run-failed.json is not a JSON array — refusing to act."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          fail_count="$(jq 'length' validate-out/run-failed.json)"
          if [[ "$fail_count" -eq 0 ]]; then
            echo "::notice::validate completed with zero revertable failures — nothing to revert."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "act=true" >> "$GITHUB_OUTPUT"
          echo "fail_count=$fail_count" >> "$GITHUB_OUTPUT"
          echo "Failing entries:"; jq -r '.[]' validate-out/run-failed.json

      - name: Locate bump PR and check revert budget
        if: steps.plan.outputs.act == 'true' || steps.plan.outputs.alert == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Resolve the bump PR by head ref via the REST pulls API. The ?head=
          # filter matches by ref name across forks, so reject any PR whose head
          # repo isn't ours — a fork PR named bump/plugin-shas must never reach the
          # contents:write paths below.
          pr_json="$(gh api "repos/$REPO/pulls?head=${REPO%%/*}:$BUMP_BRANCH&base=main&state=open&per_page=1" \
            --jq '.[0] // empty')"
          if [[ -z "$pr_json" ]]; then
            echo "::warning::No open bump PR on $BUMP_BRANCH — nothing to do."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          pr_number="$(jq -r '.number' <<<"$pr_json")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"$pr_json")"
          head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          commit_count="$(gh api "repos/$REPO/pulls/$pr_number" --jq '.commits')"
          if [[ "$head_repo" != "$REPO" ]]; then
            echo "::error::Bump PR head is from $head_repo, not $REPO — refusing to act."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Loop bound: every nightly bump force-resets the branch to a single
          # commit and every revert pass adds exactly one. commit_count is therefore
          # the per-night pass count + 1 — no date math, no comment-spoofing surface.
          if [[ "$commit_count" -gt $(( MAX_REVERT_PASSES + 1 )) ]]; then
            echo "::error::Revert budget exhausted ($((commit_count - 1))/$MAX_REVERT_PASSES passes). The validate gate keeps failing after reverting — needs a human."
            gh pr comment "$pr_number" --repo "$REPO" --body \
              "$REVERT_MARKER"$'\n\n'"⚠️ Revert budget exhausted ($((commit_count - 1)) passes). Validate keeps failing after reverting — likely a validate bug or a non-revertable failure. Pausing automatic reverts until the next nightly bump."
            echo "act=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Bump PR #$pr_number @ $head_sha ($commit_count commit(s))"
          {
            echo "act=true"
            echo "number=$pr_number"
            echo "head_sha=$head_sha"
          } >> "$GITHUB_OUTPUT"

      # Non-revertable failure: comment once and stop (no revert, no re-dispatch).
      - name: Alert on non-revertable failure
        if: steps.plan.outputs.alert == 'true' && steps.pr.outputs.act == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          NONREV: ${{ steps.plan.outputs.nonrev }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          # NONREV is a JSON array of invariant codes / schema subjects (no
          # untrusted upstream text), but neutralize defensively anyway.
          codes="$(jq -r 'def neutralize: gsub("[|\n\r\\[\\]<>`]"; " "); map(neutralize)[0:200] | join(", ")' <<<"$NONREV")"
          gh pr comment "$PR" --repo "$REPO" --body \
            "$REVERT_MARKER"$'\n\n'"⚠️ This bump PR has a **non-revertable** validate failure (\`${codes}\`) — a whole-marketplace invariant or schema error that dropping a single entry's \`source.sha\` cannot clear. Automatic reverts are paused for this PR; a human needs to resolve it. See the [validate run](${RUN_URL})."

      - name: Revert failing SHAs
        if: steps.plan.outputs.act == 'true' && steps.pr.outputs.act == 'true'
        id: revert
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p work

          gh api "repos/$REPO/contents/${MARKETPLACE}?ref=$HEAD_SHA" --jq '.content' | base64 -d > work/head.json
          gh api "repos/$REPO/contents/${MARKETPLACE}?ref=main" --jq '.content' | base64 -d > work/base.json

          # Build the reverted marketplace: for each failing plugin, restore
          # source.sha to main's value. Refuse if anything else differs — a delta
          # outside source.sha on a bump-branch entry means the branch was tampered.
          jq -c -s \
            '.[0] as $head | .[1] as $base | (.[2] | map({(.): true}) | add // {}) as $fail
             | ($base.plugins | map({(.name): .}) | add // {}) as $b
             | $head | .plugins = [
                 .plugins[] |
                 if ($fail[.name] // false) and ($b[.name] // null) != null then
                   if (. | del(.source.sha)) == ($b[.name] | del(.source.sha)) then
                     .source.sha = $b[.name].source.sha
                   else
                     error("entry \(.name) differs from main beyond source.sha — refusing to revert")
                   end
                 else . end
               ]' \
            work/head.json work/base.json validate-out/run-failed.json > work/reverted.json.compact

          jq --indent 2 '.' work/reverted.json.compact > work/reverted.json

          # Two no-action cases:
          #  - nothing actually reverted (failed names not in this PR's diff)
          #  - everything reverted (the file is back to main → PR is empty)
          if cmp -s work/reverted.json.compact <(jq -c '.' work/head.json); then
            echo "::notice::No entries to revert (failing names not in this PR)."
            echo "committed=false" >> "$GITHUB_OUTPUT"; echo "empty=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if cmp -s work/reverted.json.compact <(jq -c '.' work/base.json); then
            echo "::warning::Every bumped entry failed validate — the PR would be empty."
            echo "committed=false" >> "$GITHUB_OUTPUT"; echo "empty=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Names actually reverted (object sources only — vendored entries have a
          # string source and no source.sha).
          reverted="$(jq -c -s \
            '.[0] as $head | .[1] as $rev
             | ($head.plugins | map(select(.source | type == "object") | {(.name): .source.sha}) | add // {}) as $h
             | [$rev.plugins[] | select(.source | type == "object")
                | select(($h[.name] // null) != .source.sha) | .name]' \
            work/head.json work/reverted.json.compact)"
          echo "Reverted: $reverted"
          echo "reverted=$reverted" >> "$GITHUB_OUTPUT"

          msg="Drop $(jq 'length' <<<"$reverted") validate-failing entries from bump"
          # createCommitOnBranch: GitHub-signed, expectedHeadOid CAS so a concurrent
          # nightly force-reset fails this push loudly instead of being clobbered.
          # The base64'd marketplace can exceed MAX_ARG_STRLEN, so it travels via stdin.
          oid="$(jq -n \
            --rawfile content work/reverted.json \
            --arg repo   "$REPO" \
            --arg branch "$BUMP_BRANCH" \
            --arg oid    "$HEAD_SHA" \
            --arg msg    "$msg" \
            --arg path   "$MARKETPLACE" \
            '{
              query: "mutation($repo:String!,$branch:String!,$oid:GitObjectID!,$msg:String!,$path:String!,$contents:Base64String!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$repo,branchName:$branch},message:{headline:$msg},fileChanges:{additions:[{path:$path,contents:$contents}]},expectedHeadOid:$oid}){commit{oid}}}",
              variables: { repo: $repo, branch: $branch, oid: $oid, msg: $msg, path: $path, contents: ($content | @base64) }
            }' \
            | gh api graphql --input - --jq '.data.createCommitOnBranch.commit.oid')"
          [[ "$oid" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::createCommitOnBranch did not return a commit OID."; exit 1; }
          echo "committed=true" >> "$GITHUB_OUTPUT"; echo "empty=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Pushed revert commit $oid to $BUMP_BRANCH."

      - name: Close empty bump PR
        if: steps.revert.outputs.empty == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr comment "$PR" --repo "$REPO" --body \
            "$REVERT_MARKER"$'\n\n'"Every bumped entry failed validate. Closing — the next nightly run will retry."
          gh pr close "$PR" --repo "$REPO"

      - name: Comment with revert detail
        if: steps.revert.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          REVERTED: ${{ steps.revert.outputs.reverted }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          {
            printf '%s\n\n' "$REVERT_MARKER"
            echo "Dropped $(jq 'length' <<<"$REVERTED") entrie(s) that failed validate. The remaining bumps were unaffected."
            echo
            echo "| Plugin | Reason |"
            echo "|---|---|"
            # `detail` is raw `claude plugin validate` stdout from a cloned external
            # repo — strip markdown control chars + wrap in a code span so a
            # prompt-injected upstream can't smuggle links/images/table breakouts
            # into a public PR comment. Stripping backticks first stops a code-span
            # breakout. Match each reverted name against the fail rows by entry/subject.
            jq -r --argjson rev "$REVERTED" \
              'def neutralize: gsub("[|\n\r\\[\\]<>`]"; " ");
               .[] | (.entry // .subject) as $n | select($rev | index($n))
               | "| \($n | neutralize) | `\((.detail // "") | neutralize | .[0:200])` |"' \
              validate-out/run-verdicts.json
            echo
            echo "These entries will be retried at their next upstream SHA. See the [validate run]($RUN_URL) for full detail."
          } > /tmp/comment.md
          gh pr comment "$PR" --repo "$REPO" --body-file /tmp/comment.md

      - name: Re-dispatch validate on revised bump branch
        if: steps.revert.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run validate-plugins.yml --ref "$BUMP_BRANCH"
