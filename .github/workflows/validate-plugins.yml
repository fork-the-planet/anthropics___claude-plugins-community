name: Validate Plugins

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - '.github/actions/**'
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - '.github/actions/**'
  # `validate` is dispatched by bump-plugin-shas.yml against the bump branch. A PR
  # opened with GITHUB_TOKEN does not fire on:pull_request (GitHub's recursion
  # guard), so this required check would never report on a bump PR and the PR
  # could never go green/mergeable. workflow_dispatch is exempt from that guard;
  # the dispatched run's check lands on the branch HEAD (= the bump PR's head SHA)
  # and satisfies the required check. The dispatched run also uploads the
  # `validate-verdicts` artifact that revert-failed-bumps.yml consumes.
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Static invariant tests
        run: bash .github/actions/validate-plugins/test-invariants.sh

      - name: bump-plugin-shas skip/freeze tests
        run: bash .github/actions/bump-plugin-shas/test-bump.sh

      - name: External manifest resolution tests
        run: bash .github/actions/validate-plugins/test-external-manifest.sh

      - name: Report verdict tests (bump-revert seam)
        run: bash .github/actions/validate-plugins/test-report.sh

      # Dogfood: this repo uses its own local copy of the action.
      # External consumers MUST pin a SHA — see the action README.
      - uses: ./.github/actions/validate-plugins
        with:
          marketplace-path: .claude-plugin/marketplace.json
          skip-local-folders: "true"
          scope-errors-to-changed: "true"

      # Publish the per-entry verdicts so revert-failed-bumps.yml (a separate
      # workflow_run) can drop the failing bumps — RUNNER_TEMP is wiped at job
      # end, so an uploaded artifact is the only cross-run transport. `if: always`
      # is mandatory: the action's step above exits 1 on a validation failure, and
      # the FAILING run is precisely the one revert consumes. The action's
      # `if: always()` Report step writes all three files on every exit path;
      # `if-no-files-found: ignore` covers the Setup-crash case (nothing written) —
      # the consumer treats a missing artifact as the infra-error no-op.
      - name: Upload validate verdicts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-verdicts
          path: ${{ runner.temp }}/validate-plugins/run-*.json
          if-no-files-found: ignore
          retention-days: 7
