name: Bump Plugin SHAs

# Nightly freshness sweep: for each external entry whose upstream HEAD has moved
# past its pinned SHA, validate at the new SHA with `claude plugin validate`
# inline, then open ONE batch PR (bump/plugin-shas) with all passing bumps. Each
# run force-resets that branch, so a previous night's unmerged PR is replaced —
# review and merge same-day to avoid churn.
#
# Bot-free — uses the default GITHUB_TOKEN, so the bump commits + PR are authored
# by github-actions[bot] (the bot is the last pusher, which lets a human merge the
# green PR without tripping a "last pusher can't approve" rule). PRs opened with
# GITHUB_TOKEN don't fire on:pull_request, so the required check `Validate Plugins`
# would never report on the bump PR; workflow_dispatch is exempt from that
# recursion guard, so we dispatch it ourselves on the bump branch after the PR is
# opened. The dispatched check lands on the branch HEAD (= PR head) and satisfies
# the required check, AND uploads the verdicts artifact revert-failed-bumps.yml
# reads.
#
# Cost-control / convergence is downstream:
#   - freeze-shas (.github/freeze-shas.txt) holds known-broken-at-HEAD entries at
#     their current pin so they're never bumped into a red PR.
#   - revert-failed-bumps.yml drops any entry that still fails the dispatched
#     validate from the batch PR, so one bad upstream can't block the rest and the
#     PR converges to green on its own.

on:
  schedule:
    - cron: '23 7 * * *'  # Daily 07:23 UTC
  workflow_dispatch:
    inputs:
      max_bumps:
        description: Cap on plugins bumped this run
        required: false
        default: '300'

permissions:
  contents: write
  pull-requests: write
  actions: write  # gh workflow run validate-plugins.yml on the bump branch

concurrency:
  group: bump-plugin-shas

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # freeze-shas input is a space-separated name list; the committed file is
      # one slug per line (with # comments). Join the non-comment lines.
      - name: Load freeze list
        id: freeze
        run: |
          set -euo pipefail
          f=.github/freeze-shas.txt
          if [[ -f "$f" ]]; then
            list="$(grep -vE '^[[:space:]]*(#|$)' "$f" | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')"
          else
            list=""
          fi
          echo "list=$list" >> "$GITHUB_OUTPUT"
          echo "::notice::freeze-shas: $(wc -w <<<"$list") entr(y/ies) held at current pin"

      # createCommitOnBranch-based bump so commits are signed by GitHub and
      # satisfy the org-level required_signatures ruleset on main. Local dogfood
      # ref (this repo hosts the action); external consumers SHA-pin it.
      - uses: ./.github/actions/bump-plugin-shas
        id: bump
        with:
          marketplace-path: .claude-plugin/marketplace.json
          max-bumps: ${{ inputs.max_bumps || '300' }}
          freeze-shas: ${{ steps.freeze.outputs.list }}
          claude-cli-version: latest

      # `bump/plugin-shas` is the action's default pr-branch (batch mode). The
      # dispatched validate run diffs the branch against origin/main (the action's
      # base-ref fallback when there's no pull_request event) and validates only
      # the bumped entries.
      # NOTE: this requires validate-plugins.yml WITH `workflow_dispatch:` to
      # already be on the base branch (main), because the bump action branches
      # bump/plugin-shas off main — so the dispatch resolves the workflow as it
      # exists on main. This works once this feature is merged; a pre-merge test
      # from a feature branch dispatches main's (old) validate-plugins.yml and the
      # dispatch fails. Don't let that failure mask an otherwise-successful bump.
      - name: Dispatch validate on bump branch
        if: steps.bump.outputs.pr-url != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run validate-plugins.yml --ref bump/plugin-shas \
            || echo "::warning::Could not dispatch validate-plugins.yml on bump/plugin-shas — is validate-plugins.yml with workflow_dispatch already on the base branch? (post-merge requirement)"
